---

name: Pytest tests

on:
  - pull_request
  - push

# permission can be added at job level or workflow level
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: write   # This is required for actions/checkout
  pull-requests: write

env:
  VERBOSITY: 4

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
    - uses: actions/checkout@v4

    - uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: make
        version: 1.0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Restore cached virtualenv
      uses: actions/cache/restore@v5
      with:
        key: venv-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('pyproject.toml','uv.lock') }}
        path: venv

    - name: Install uv (astral action)
      uses: astral-sh/setup-uv@v8.0.0

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Bootstrap (make init)
      run: make init

    - name: "Rung 0.5: Lint"
      run: make test-lint

    - name: "Rung 0.35: Typecheck"
      run: make test-typecheck

    - name: "Rung 2.0: Tests"
      run: make test-all

    - name: "Rung 3.0: Coverage report"
      if: always()
      continue-on-error: true
      run: make test-coverage

    - name: Saved cached virtualenv
      if: always()
      uses: actions/cache/save@v5
      with:
        key: venv-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('pyproject.toml','uv.lock') }}
        path: venv

# https://adamj.eu/tech/2023/11/02/github-actions-faster-python-virtual-environments/
