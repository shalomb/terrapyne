---

name: Pytest tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  VERBOSITY: 4

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Install dependencies
      run: uv sync --all-extras   # skip pre-commit hook install on CI runner

    - name: Lint
      run: make test-lint

    - name: Typecheck
      run: make test-typecheck

    - name: Tests + coverage
      run: uv run python -m pytest tests/ --cov=src --cov-report=term --no-header -q
      continue-on-error: true   # coverage threshold failure is informational
