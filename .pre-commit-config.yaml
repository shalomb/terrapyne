repos:
  # --- Pre-commit (inner loop: every commit) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        types: [python]

  # --- Pre-push (inner loop: fast checks only) ---
  - repo: local
    hooks:
      - id: test-fast
        name: test-fast (lint + typecheck)
        entry: make test-fast
        language: system
        pass_filenames: false
        stages: [pre-push]
